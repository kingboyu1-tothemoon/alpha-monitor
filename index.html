<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资金异动初筛</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Free Capital Flow Screener</p>
        <h1>资金异动初筛</h1>
        <p>输入美股代码，系统用免费延迟行情计算成交量、相对放量、短中期趋势和资金关注度评分。</p>
      </section>

      <section class="search-panel">
        <label class="search-box">
          <span aria-hidden="true">⌕</span>
          <input id="symbolInput" type="search" placeholder="输入股票代码，例如 TSLA / NVDA / AAPL" autocomplete="off" />
        </label>
        <button id="searchButton" type="button">查询资金情况</button>
      </section>

      <p class="status" id="statusText">等待输入</p>

      <section class="result-card" id="resultCard" hidden>
        <div class="result-head">
          <div>
            <span class="label">当前标的</span>
            <h2 id="assetTitle">--</h2>
            <p id="assetMeta">--</p>
          </div>
          <div class="score-box">
            <span>资金评分</span>
            <strong id="flowScore">--</strong>
          </div>
        </div>

        <div class="direction-bar">
          <span>流向判断</span>
          <strong id="flowDirection">--</strong>
        </div>

        <div class="metric-grid">
          <article>
            <span>最新价格</span>
            <strong id="latestClose">--</strong>
          </article>
          <article>
            <span>最新涨跌幅</span>
            <strong id="changePercent">--</strong>
          </article>
          <article>
            <span>相对成交量</span>
            <strong id="relativeVolume">--</strong>
          </article>
          <article>
            <span>最新成交量</span>
            <strong id="latestVolume">--</strong>
          </article>
          <article>
            <span>20 日均量</span>
            <strong id="avg20Volume">--</strong>
          </article>
          <article>
            <span>5 日趋势</span>
            <strong id="return5d">--</strong>
          </article>
          <article>
            <span>20 日趋势</span>
            <strong id="return20d">--</strong>
          </article>
          <article>
            <span>成交额</span>
            <strong id="dollarVolume">--</strong>
          </article>
        </div>

        <section class="qualitative-panel">
          <div class="section-title">
            <span>定性资金结构</span>
            <strong>非 API 推断</strong>
          </div>
          <div class="signal-grid" id="qualitativeList"></div>
        </section>

        <div class="evidence-list" id="evidenceList"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
