<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资金流监控</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Tradier Options Monitor</p>
        <h1>资金流入流出监控</h1>
        <p>输入股票代码，通过 Tradier 查看最近期权持仓、LEAP Call、Gamma、IV 和 Put/Call OI Ratio。</p>
      </section>

      <section class="search-panel">
        <label class="search-box">
          <span>⌕</span>
          <input id="symbolInput" type="search" placeholder="输入股票代码，例如 TSLA / NVDA" autocomplete="off" />
        </label>
        <button id="searchButton" type="button">查询资金情况</button>
      </section>

      <p class="status" id="statusText">等待输入</p>

      <section class="result-card" id="resultCard" hidden>
        <div class="result-head">
          <div>
            <span class="label">当前标的</span>
            <h2 id="assetTitle">--</h2>
            <p id="assetMeta">--</p>
          </div>
          <div class="score-box">
            <span>资金评分</span>
            <strong id="flowScore">--</strong>
          </div>
        </div>

        <div class="metric-grid">
          <article>
            <span>总 OI</span>
            <strong id="totalOi">--</strong>
          </article>
          <article>
            <span>LEAP Call OI</span>
            <strong id="leapCallOi">--</strong>
          </article>
          <article>
            <span>Put/Call OI Ratio</span>
            <strong id="putCallRatio">--</strong>
          </article>
          <article>
            <span>Gamma Exposure</span>
            <strong id="gammaExposure">--</strong>
          </article>
          <article>
            <span>平均 IV</span>
            <strong id="avgIv">--</strong>
          </article>
          <article>
            <span>扫描合约</span>
            <strong id="contractsScanned">--</strong>
          </article>
        </div>

        <div class="evidence-list" id="evidenceList"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
