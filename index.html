<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaPulse 股票评分</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">AlphaPulse</p>
        <h1>股票爆发潜力评分</h1>
        <p>输入美股代码，按资金、产业景气度、财报拐点、情绪扩散四个维度计算评分。</p>
      </section>

      <section class="search-panel">
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="输入美股代码，例如 NVDA，然后按 Enter" autocomplete="off" />
        </label>
        <button class="primary-button" type="button" id="scoreButton">开始评分</button>
      </section>

      <section class="status-row">
        <span id="apiStatus">等待输入</span>
      </section>

      <section class="result-card" id="resultCard">
        <div class="result-head">
          <div>
            <span class="label">当前标的</span>
            <h2 id="assetTitle">--</h2>
            <p id="assetMeta">输入股票代码后显示评分结果</p>
          </div>
          <div class="total-score">
            <span>总分</span>
            <strong id="totalScore">--</strong>
          </div>
        </div>

        <div class="market-row">
          <span>价格 <strong id="priceValue">--</strong></span>
          <span>涨跌 <strong id="changeValue">--</strong></span>
          <span>相对量 <strong id="volumeValue">--</strong></span>
        </div>

        <div class="dimension-grid" id="dimensionGrid"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
